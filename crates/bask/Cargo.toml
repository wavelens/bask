[package]
name = "bask"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Build Tasks"
readme = "../../README.md"
keywords = ["pipeline", "dataflow", "workers", "streaming", "async"]
categories = ["asynchronous", "concurrency"]

[dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time", "signal"] }
async-trait = "0.1"
anyhow = "1"
thiserror = "2"
arrow = { version = "59", optional = true }
parquet = { version = "59", features = ["arrow"], optional = true }

[features]
formats = ["dep:arrow", "dep:parquet"]

[[example]]
name = "streaming"
required-features = ["formats"]

[package.metadata.docs.rs]
all-features = true
